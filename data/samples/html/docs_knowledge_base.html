<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Atlas Docs Hub</title>
  <meta name="description" content="A documentation-style sample with sidebar navigation." />
  <style>
    body { font-family: "IBM Plex Sans", system-ui, sans-serif; color: #1f2937; background: #ffffff; }
    header { background: #0d9488; color: #ffffff; padding: 24px; }
    nav a { color: #ccfbf1; margin-right: 14px; }
    .layout { display: grid; grid-template-columns: 260px 1fr; gap: 28px; }
    aside.docs-sidebar { background: #f0fdfa; padding: 20px; }
    code { background: #ecfeff; color: #155e75; padding: 2px 4px; }
  </style>
</head>
<body>
  <header>
    <h1>Atlas Docs Hub</h1>
    <nav>
      <a href="/start">Start</a>
      <a href="/guides">Guides</a>
      <a href="/api">API</a>
    </nav>
  </header>
  <div class="layout">
    <aside class="docs-sidebar">
      <h2>Documentation</h2>
      <p>Install, configure, deploy, and troubleshoot.</p>
    </aside>
    <main>
      <h2>Quickstart</h2>
      <p>Run <code>atlas init</code>, edit the config, and publish the docs site.</p>
      <h3>Next steps</h3>
      <p>Use guides for migration notes and API examples.</p>
    </main>
  </div>
  <footer>Atlas Docs Hub support</footer>
</body>
</html>
