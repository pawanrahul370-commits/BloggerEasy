<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Events</title>
  <meta name="description" content="Events HTML fixture for BloggerEasy" />
  <style>
    body { margin:0; font-family:system-ui,sans-serif; background:#f8fafc; color:#0f172a; }
    header { padding:2rem 1.25rem; background:#4c1d95; color:#f5f3ff; }
    main { max-width:720px; margin:0 auto; padding:1.5rem 1.25rem 3rem; }
    .evt { background:#fff; border:1px solid #e9d5ff; border-radius:12px; padding:1rem 1.1rem; margin:.75rem 0; }
    .evt h2 { margin:0 0 .35rem; font-size:1.05rem; color:#5b21b6; }
    .meta { color:#7c3aed; font-size:.85rem; font-weight:600; }
    footer { text-align:center; color:#94a3b8; font-size:.85rem; padding:2rem; }
  </style>
</head>
<body>
  <header><h1>Upcoming events</h1><p>Sample schedule for theme export</p></header>
  <main>
    <div class="evt"><div class="meta">Sat · 10:00</div><h2>Open demo day</h2><p>Product walkthrough and Q&amp;A.</p></div>
    <div class="evt"><div class="meta">Wed · 19:00</div><h2>Community office hours</h2><p>Bring your bounty questions.</p></div>
  </main>
  <footer>Demo HTML · BloggerEasy events_page</footer>
</body>
</html>
