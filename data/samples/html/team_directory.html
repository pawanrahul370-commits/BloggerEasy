<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><title>Team directory sample</title>
<style>body{font-family:system-ui;margin:0;background:#fafafa}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;padding:1.5rem;max-width:900px;margin:0 auto}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:1rem}
.role{color:#6b7280;font-size:.85rem}</style></head>
<body><header style="padding:1.25rem;background:#111;color:#fff"><h1 style="margin:0;font-size:1.3rem">Team directory</h1></header>
<div class="grid">
<div class="card"><strong>Alex</strong><div class="role">Product</div></div>
<div class="card"><strong>Sam</strong><div class="role">Engineering</div></div>
<div class="card"><strong>Riley</strong><div class="role">Design</div></div>
</div></body></html>
