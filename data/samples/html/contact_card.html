<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Contact card</title>
  <meta name="description" content="Contact card layout sample for BloggerEasy" />
  <style>
    body { margin:0; font-family: system-ui,sans-serif; background:#0b1220; color:#e2e8f0; }
    .card { max-width:420px; margin:3rem auto; padding:1.75rem; border-radius:16px;
            background:#111827; border:1px solid #243049; }
    h1 { margin:0 0 0.25rem; font-size:1.35rem; }
    .role { color:#94a3b8; margin:0 0 1rem; font-size:0.9rem; }
    a { color:#7dd3fc; text-decoration:none; }
    .row { display:flex; gap:0.5rem; margin:0.4rem 0; color:#cbd5e1; font-size:0.92rem; }
    footer { text-align:center; color:#64748b; margin-top:2rem; font-size:0.8rem; }
  </style>
</head>
<body>
  <article class="card">
    <h1>Alex Nguyen</h1>
    <p class="role">Product engineer · MergeOS</p>
    <div class="row">Email: <a href="mailto:alex@example.com">alex@example.com</a></div>
    <div class="row">Web: <a href="https://example.com">example.com</a></div>
    <div class="row">Location: Ho Chi Minh City</div>
  </article>
  <footer>Demo HTML · BloggerEasy contact_card</footer>
</body>
</html>
