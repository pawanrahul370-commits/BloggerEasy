<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>FAQ help center sample</title>
  <meta name="description" content="FAQ accordion sample for BloggerEasy"/>
  <style>
    body{margin:0;font-family:system-ui,sans-serif;background:#f8fafc;color:#0f172a}
    .wrap{max-width:720px;margin:0 auto;padding:2rem 1rem 3rem}
    h1{font-size:1.75rem;margin:0 0 .5rem}
    .sub{color:#64748b;margin-bottom:1.25rem}
    details{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:.85rem 1rem;margin:.55rem 0}
    summary{cursor:pointer;font-weight:600}
    p{color:#475569;line-height:1.5;margin:.5rem 0 0}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Help center</h1>
    <p class="sub">Sample FAQ for theme conversion demos.</p>
    <details open><summary>How do I import the XML?</summary><p>In Blogger: Theme → Backup/Restore → Upload.</p></details>
    <details><summary>Can I change colors?</summary><p>Edit CSS variables in the generated theme skin.</p></details>
    <details><summary>Is mobile included?</summary><p>Yes — fixtures use responsive grids and media queries.</p></details>
  </div>
</body>
</html>
