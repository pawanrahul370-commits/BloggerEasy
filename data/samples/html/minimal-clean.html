<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Clean Theme</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; line-height: 1.6; color: #333; background: #fff; }
        .container { max-width: 800px; margin: 0 auto; padding: 2rem; }
        header { border-bottom: 1px solid #eee; padding-bottom: 1rem; margin-bottom: 2rem; }
        h1 { font-size: 2.5rem; font-weight: 300; color: #222; }
        h2 { font-size: 1.5rem; font-weight: 400; color: #444; margin: 1.5rem 0 0.5rem; }
        p { margin-bottom: 1rem; color: #555; }
        .post { margin-bottom: 3rem; padding-bottom: 2rem; border-bottom: 1px solid #f0f0f0; }
        .meta { font-size: 0.875rem; color: #888; }
        footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid #eee; font-size: 0.875rem; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Blog Title</h1>
            <p class="meta">A minimal, clean theme for focused reading</p>
        </header>
        <main>
            <article class="post">
                <h2>First Post</h2>
                <p class="meta">Published on January 1, 2026</p>
                <p>This is a minimal clean theme perfect for personal blogs and documentation sites.</p>
            </article>
        </main>
        <footer>
            <p>&copy; 2026 Blog. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
