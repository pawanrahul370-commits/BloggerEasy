<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Pricing</title>
  <meta name="description" content="Pricing HTML fixture for BloggerEasy" />
  <style>
    body { margin:0; font-family:system-ui,sans-serif; background:#f8fafc; color:#0f172a; }
    header { padding:2rem 1.25rem; background:#0f172a; color:#f1f5f9; text-align:center; }
    main { max-width:900px; margin:0 auto; padding:2rem 1.25rem 3rem;
      display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:1rem; }
    .card { background:#fff; border:1px solid #e2e8f0; border-radius:12px; padding:1.25rem; }
    .card h2 { margin:0 0 .35rem; font-size:1.1rem; }
    .price { font-size:1.6rem; font-weight:700; color:#0369a1; }
    footer { text-align:center; color:#94a3b8; font-size:.85rem; padding:2rem; }
  </style>
</head>
<body>
  <header><h1>Pricing plans</h1><p>Sample tiers for theme export</p></header>
  <main>
    <div class="card"><h2>Starter</h2><div class="price">$0</div><p>Offline fixtures & demos</p></div>
    <div class="card"><h2>Pro</h2><div class="price">$19</div><p>Custom HTML export</p></div>
    <div class="card"><h2>Team</h2><div class="price">$49</div><p>Multi-site themes</p></div>
  </main>
  <footer>Demo HTML · BloggerEasy pricing_page</footer>
</body>
</html>
