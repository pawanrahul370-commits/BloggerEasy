<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Studio Atlas — Photography Portfolio</title>
  <meta name="description" content="Photography grid sample for BloggerEasy" />
  <style>
    body { margin:0; font-family: 'Helvetica Neue', Arial, sans-serif; background:#111; color:#f5f5f5; }
    header { padding:2.5rem 1.5rem 1rem; text-align:center; }
    header h1 { margin:0; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; font-size:1.1rem; }
    header p { color:#a3a3a3; margin:0.6rem 0 0; }
    .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:0.5rem; max-width:960px; margin:1.5rem auto 3rem; padding:0 0.75rem; }
    .tile { aspect-ratio:1; background:linear-gradient(135deg,#262626,#404040); display:flex; align-items:flex-end; padding:0.75rem; font-size:0.8rem; color:#e5e5e5; }
    .tile:nth-child(2) { background:linear-gradient(160deg,#1e3a5f,#0f172a); }
    .tile:nth-child(3) { background:linear-gradient(160deg,#3f2a1a,#1c1917); }
    .tile:nth-child(4) { background:linear-gradient(160deg,#14532d,#052e16); }
    .tile:nth-child(5) { background:linear-gradient(160deg,#4c1d95,#1e1b4b); }
    .tile:nth-child(6) { background:linear-gradient(160deg,#7f1d1d,#1c1917); }
    footer { text-align:center; color:#737373; padding:2rem; font-size:0.85rem; }
    @media (max-width:640px) { .grid { grid-template-columns:1fr 1fr; } }
  </style>
</head>
<body>
  <header>
    <h1>Studio Atlas</h1>
    <p>Selected frames · 2026</p>
  </header>
  <div class="grid">
    <div class="tile">Harbor dawn</div>
    <div class="tile">Blue hour quay</div>
    <div class="tile">Desert road</div>
    <div class="tile">Forest path</div>
    <div class="tile">Neon alley</div>
    <div class="tile">Rooftop red</div>
  </div>
  <footer>Demo HTML · BloggerEasy photo_grid</footer>
</body>
</html>
