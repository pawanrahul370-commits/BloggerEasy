<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Newsletter sample</title>
  <meta name="description" content="Email-style newsletter sample for BloggerEasy" />
  <style>
    body { margin:0; font-family: system-ui, sans-serif; background:#f1f5f9; color:#0f172a; }
    .wrap { max-width:560px; margin:2rem auto; background:#fff; border:1px solid #e2e8f0; border-radius:12px; overflow:hidden; }
    header { background:#0f172a; color:#f8fafc; padding:1.5rem; }
    header h1 { margin:0; font-size:1.35rem; }
    header p { margin:0.4rem 0 0; color:#94a3b8; font-size:0.9rem; }
    .block { padding:1.25rem 1.5rem; border-bottom:1px solid #f1f5f9; }
    .block h2 { margin:0 0 0.5rem; font-size:1.05rem; }
    .block p { margin:0; color:#475569; line-height:1.5; font-size:0.95rem; }
    .cta { display:inline-block; margin-top:0.75rem; background:#2563eb; color:#fff; text-decoration:none; padding:0.55rem 0.9rem; border-radius:0.4rem; font-weight:600; font-size:0.9rem; }
    footer { text-align:center; color:#94a3b8; padding:1rem; font-size:0.8rem; }
  </style>
</head>
<body>
  <article class="wrap">
    <header>
      <h1>MergeOS weekly</h1>
      <p>Ship notes · mock demos · bounty tips</p>
    </header>
    <section class="block">
      <h2>New MCP fleet</h2>
      <p>gazebo-mcp and rviz-mcp join the offline-friendly agent toolbox.</p>
      <a class="cta" href="#">Read more</a>
    </section>
    <section class="block">
      <h2>Theme pipeline</h2>
      <p>Golden HTML fixtures keep Blogger XML generation honest in CI.</p>
    </section>
  </article>
  <footer>Demo HTML · BloggerEasy newsletter</footer>
</body>
</html>
