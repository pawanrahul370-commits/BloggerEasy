<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Mira Stone Portfolio</title>
  <meta name="description" content="A visual portfolio sample with project cards." />
  <style>
    body { font-family: Inter, Arial, sans-serif; color: #111111; background: #fafafa; }
    header { background: #6d28d9; color: #ffffff; padding: 40px; }
    nav a { color: #ffffff; margin-right: 16px; }
    .projects { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .card { background: #ffffff; border: 1px solid #e5e7eb; padding: 18px; }
  </style>
</head>
<body>
  <header>
    <h1>Mira Stone Portfolio</h1>
    <nav class="nav">
      <a href="#work">Work</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>
  <main id="work" class="projects">
    <article class="card">
      <h2>Brand System</h2>
      <p>Identity refresh for a local food studio.</p>
    </article>
    <article class="card">
      <h2>Editorial Kit</h2>
      <p>Reusable layouts for a small magazine team.</p>
    </article>
    <article class="card">
      <h2>Launch Page</h2>
      <p>Campaign visuals and conversion copy.</p>
    </article>
  </main>
  <footer>Selected work and contact notes.</footer>
</body>
</html>
