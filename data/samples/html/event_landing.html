<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Evently — Product Launch Night</title>
  <meta name="description" content="Event landing sample for BloggerEasy" />
  <style>
    body { margin:0; font-family: system-ui,sans-serif; color:#0f172a; background:#0b1220; }
    .hero { min-height:70vh; display:flex; flex-direction:column; justify-content:center; align-items:center;
            text-align:center; color:#f8fafc; padding:3rem 1.25rem;
            background: radial-gradient(circle at 30% 20%, #312e81, transparent 50%),
                        radial-gradient(circle at 80% 60%, #0e7490, transparent 45%), #0b1220; }
    .hero h1 { font-size:clamp(2rem,5vw,3.2rem); margin:0 0 0.75rem; }
    .hero p { max-width:36rem; color:#cbd5e1; line-height:1.6; }
    .cta { margin-top:1.5rem; display:inline-block; background:#22d3ee; color:#0f172a; font-weight:700;
           padding:0.85rem 1.4rem; border-radius:999px; text-decoration:none; }
    .agenda { max-width:720px; margin:0 auto; padding:2.5rem 1.25rem 3.5rem; color:#e2e8f0; }
    .agenda h2 { color:#67e8f9; font-size:1rem; text-transform:uppercase; letter-spacing:0.08em; }
    .row { display:flex; gap:1rem; padding:0.85rem 0; border-bottom:1px solid #1e293b; }
    .time { width:5.5rem; color:#94a3b8; font-variant-numeric:tabular-nums; }
    footer { text-align:center; color:#64748b; padding:2rem; font-size:0.85rem; }
  </style>
</head>
<body>
  <section class="hero">
    <h1>Product Launch Night</h1>
    <p>Join us for live demos, lightning talks, and an open after-party on the rooftop.</p>
    <a class="cta" href="#agenda">View agenda</a>
  </section>
  <section class="agenda" id="agenda">
    <h2>Agenda</h2>
    <div class="row"><div class="time">18:00</div><div>Doors + welcome drink</div></div>
    <div class="row"><div class="time">18:30</div><div>Keynote: shipping themes in minutes</div></div>
    <div class="row"><div class="time">19:15</div><div>Live convert URL → Blogger XML</div></div>
    <div class="row"><div class="time">20:00</div><div>Rooftop networking</div></div>
  </section>
  <footer>Demo HTML · BloggerEasy event_landing</footer>
</body>
</html>
