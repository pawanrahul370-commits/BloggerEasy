<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><title>Event schedule sample</title>
<style>body{font-family:system-ui;margin:0;background:#0f172a;color:#e2e8f0}
.wrap{max-width:720px;margin:2rem auto;padding:0 1rem}
h1{font-size:1.5rem}.slot{border-left:3px solid #38bdf8;padding:.75rem 1rem;margin:1rem 0;background:#1e293b;border-radius:0 8px 8px 0}
.time{color:#94a3b8;font-size:.85rem}</style></head>
<body><div class="wrap"><h1>Ship week schedule</h1>
<div class="slot"><div class="time">09:00</div><strong>Keynote — offline-first tools</strong></div>
<div class="slot"><div class="time">11:00</div><strong>Workshop — Blogger themes</strong></div>
<div class="slot"><div class="time">14:00</div><strong>Demo — MCP fleet</strong></div>
</div></body></html>
