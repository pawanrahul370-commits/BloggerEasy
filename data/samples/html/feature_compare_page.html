<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Feature Comparison</title>
  <meta name="description" content="Feature comparison table HTML fixture for BloggerEasy" />
  <style>
    body { margin:0; font-family:system-ui,sans-serif; background:#f8fafc; color:#0f172a; }
    header { max-width:800px; margin:0 auto; padding:2.5rem 1.25rem 1rem; }
    main { max-width:800px; margin:0 auto; padding:0 1.25rem 3rem; }
    table { width:100%; border-collapse:collapse; background:#fff;
      border:1px solid #e2e8f0; border-radius:12px; overflow:hidden; }
    th, td { padding:.85rem 1rem; text-align:left; border-bottom:1px solid #e2e8f0; }
    th { background:#1e293b; color:#f1f5f9; font-weight:600; }
    tr:last-child td { border-bottom:none; }
    .yes { color:#059669; font-weight:600; }
    .no { color:#94a3b8; }
    footer { text-align:center; color:#94a3b8; font-size:.85rem; padding:2rem; }
  </style>
</head>
<body>
  <header><h1>Plan comparison</h1><p>Sample feature matrix for theme export</p></header>
  <main>
    <table>
      <thead><tr><th>Feature</th><th>Starter</th><th>Pro</th></tr></thead>
      <tbody>
        <tr><td>Offline fixtures</td><td class="yes">Yes</td><td class="yes">Yes</td></tr>
        <tr><td>API export</td><td class="no">—</td><td class="yes">Yes</td></tr>
        <tr><td>Theme packs</td><td class="yes">3</td><td class="yes">Unlimited</td></tr>
        <tr><td>Priority support</td><td class="no">—</td><td class="yes">Yes</td></tr>
      </tbody>
    </table>
  </main>
  <footer>Demo HTML · BloggerEasy feature_compare_page</footer>
</body>
</html>
