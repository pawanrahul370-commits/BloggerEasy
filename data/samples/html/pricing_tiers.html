<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><title>Pricing tiers sample</title>
<style>
body{font-family:system-ui;margin:0;background:#f8fafc;color:#0f172a}
.wrap{max-width:960px;margin:2rem auto;display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;padding:0 1rem}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:1.25rem}
.price{font-size:1.8rem;font-weight:700;color:#2563eb}
</style></head>
<body><div class="wrap">
<div class="card"><h2>Starter</h2><div class="price">$9</div><p>1 site · basic themes</p></div>
<div class="card"><h2>Pro</h2><div class="price">$29</div><p>5 sites · custom CSS</p></div>
<div class="card"><h2>Studio</h2><div class="price">$79</div><p>Unlimited · API</p></div>
</div></body></html>
