<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Modern Theme</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; line-height: 1.7; color: #e0e0e0; background: #1a1a2e; }
        .container { max-width: 900px; margin: 0 auto; padding: 2rem; }
        header { background: linear-gradient(135deg, #16213e 0%, #0f3460 100%); padding: 3rem 2rem; margin: -2rem -2rem 2rem; border-radius: 0 0 1rem 1rem; }
        h1 { font-size: 2.5rem; font-weight: 700; color: #fff; margin-bottom: 0.5rem; }
        h2 { font-size: 1.5rem; font-weight: 600; color: #e94560; margin: 2rem 0 0.75rem; }
        p { margin-bottom: 1rem; color: #b0b0b0; }
        .post { background: #16213e; padding: 1.5rem; border-radius: 0.5rem; margin-bottom: 2rem; border-left: 4px solid #e94560; }
        .meta { font-size: 0.875rem; color: #888; }
        a { color: #e94560; text-decoration: none; }
        a:hover { text-decoration: underline; }
        footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid #333; font-size: 0.875rem; color: #666; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Blog Title</h1>
            <p class="meta">A modern dark theme for tech blogs</p>
        </header>
        <main>
            <article class="post">
                <h2>First Post</h2>
                <p class="meta">Published on January 1, 2026</p>
                <p>This dark modern theme is perfect for tech blogs, gaming sites, and creative portfolios.</p>
            </article>
        </main>
        <footer>
            <p>&copy; 2026 Blog. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
