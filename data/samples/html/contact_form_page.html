<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Contact Form</title>
  <meta name="description" content="Contact form HTML fixture for BloggerEasy" />
  <style>
    body { margin:0; font-family:system-ui,sans-serif; background:#f1f5f9; color:#0f172a; }
    header { max-width:520px; margin:0 auto; padding:2.5rem 1.25rem 1rem; }
    form { max-width:520px; margin:0 auto; padding:0 1.25rem 3rem; display:grid; gap:.85rem; }
    label { font-weight:600; font-size:.9rem; display:block; margin-bottom:.3rem; }
    input, textarea { width:100%; box-sizing:border-box; padding:.7rem .85rem;
      border:1px solid #cbd5e1; border-radius:10px; font:inherit; background:#fff; }
    button { justify-self:start; background:#0369a1; color:#fff; border:0; border-radius:10px;
      padding:.7rem 1.2rem; font-weight:600; cursor:pointer; }
    footer { text-align:center; color:#94a3b8; font-size:.85rem; padding:2rem; }
  </style>
</head>
<body>
  <header><h1>Contact</h1><p>Sample contact form for theme export</p></header>
  <form action="#" method="post">
    <div><label for="name">Name</label><input id="name" name="name" type="text" placeholder="Your name" /></div>
    <div><label for="email">Email</label><input id="email" name="email" type="email" placeholder="you@example.com" /></div>
    <div><label for="msg">Message</label><textarea id="msg" name="msg" rows="4" placeholder="How can we help?"></textarea></div>
    <button type="submit">Send</button>
  </form>
  <footer>Demo HTML · BloggerEasy contact_form_page</footer>
</body>
</html>
