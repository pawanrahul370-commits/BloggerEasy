<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><title>Gallery wall sample</title>
<style>
body{margin:0;font-family:system-ui;background:#111;color:#eee}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:1rem;max-width:900px;margin:0 auto}
.tile{aspect-ratio:1;background:linear-gradient(135deg,#334,#668);border-radius:8px}
h1{padding:1rem;font-size:1.3rem}
</style></head>
<body><h1>Gallery wall</h1><div class="grid">
<div class="tile"></div><div class="tile" style="background:linear-gradient(135deg,#553,#a86)"></div>
<div class="tile" style="background:linear-gradient(135deg,#245,#48a)"></div>
<div class="tile" style="background:linear-gradient(135deg,#252,#4a8)"></div>
<div class="tile" style="background:linear-gradient(135deg,#522,#a64)"></div>
<div class="tile"></div>
</div></body></html>
