<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Logo Cloud</title>
  <meta name="description" content="Logo cloud HTML fixture for BloggerEasy" />
  <style>
    body { margin:0; font-family:system-ui,sans-serif; background:#fff; color:#0f172a; }
    header { text-align:center; padding:2.5rem 1rem 1rem; }
    main { max-width:840px; margin:0 auto; padding:1rem 1.25rem 3rem;
      display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; }
    .logo { background:#f1f5f9; border:1px solid #e2e8f0; border-radius:12px;
      min-height:72px; display:flex; align-items:center; justify-content:center;
      font-weight:700; color:#64748b; letter-spacing:.04em; }
    footer { text-align:center; color:#94a3b8; font-size:.85rem; padding:2rem; }
  </style>
</head>
<body>
  <header><h1>Trusted by teams</h1><p>Sample logo cloud for theme export</p></header>
  <main>
    <div class="logo">ACME</div><div class="logo">NOVA</div>
    <div class="logo">ORBIT</div><div class="logo">PULSE</div>
    <div class="logo">RIVER</div><div class="logo">SUMMIT</div>
    <div class="logo">TRACE</div><div class="logo">WAVE</div>
  </main>
  <footer>Demo HTML · BloggerEasy logo_cloud_page</footer>
</body>
</html>
