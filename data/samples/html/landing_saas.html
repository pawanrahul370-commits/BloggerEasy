<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Northwind Cloud</title>
  <meta name="description" content="SaaS landing sample for BloggerEasy" />
  <style>
    body { margin:0; font-family: Inter, system-ui, sans-serif; color:#0f172a; background:#f8fafc; }
    header { background: linear-gradient(120deg,#0ea5e9,#6366f1); color:#fff; padding:3rem 2rem; text-align:center; }
    .cta { display:inline-block; margin-top:1rem; background:#fff; color:#0ea5e9; padding:0.75rem 1.25rem; border-radius:999px; font-weight:700; text-decoration:none; }
    .features { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; max-width:960px; margin:2rem auto; padding:0 1rem; }
    .card { background:#fff; border:1px solid #e2e8f0; border-radius:14px; padding:1.25rem; }
    footer { text-align:center; color:#64748b; padding:2rem; }
  </style>
</head>
<body>
  <header>
    <h1>Northwind Cloud</h1>
    <p>Ship blogs faster with theme automation.</p>
    <a class="cta" href="#">Start free</a>
  </header>
  <section class="features">
    <div class="card"><h2>Templates</h2><p>Portfolio, news, dark, magazine.</p></div>
    <div class="card"><h2>URL import</h2><p>Fetch a public page into Blogger XML.</p></div>
    <div class="card"><h2>Image palette</h2><p>Pull colors from a mockup.</p></div>
  </section>
  <footer>Demo HTML · BloggerEasy</footer>
</body>
</html>
