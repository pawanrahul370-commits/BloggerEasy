<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Stats Counters</title>
  <meta name="description" content="Stats counters HTML fixture for BloggerEasy" />
  <style>
    body { margin:0; font-family:system-ui,sans-serif; background:#0f172a; color:#e2e8f0; }
    header { text-align:center; padding:2.5rem 1rem 1rem; }
    main { max-width:900px; margin:0 auto; padding:1rem 1.25rem 3rem;
      display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; }
    .stat { background:#1e293b; border:1px solid #334155; border-radius:14px;
      padding:1.5rem 1rem; text-align:center; }
    .stat .n { font-size:2rem; font-weight:700; color:#38bdf8; }
    .stat p { margin:.4rem 0 0; color:#94a3b8; font-size:.95rem; }
    footer { text-align:center; color:#64748b; font-size:.85rem; padding:2rem; }
  </style>
</head>
<body>
  <header><h1>By the numbers</h1><p>Sample stats strip for theme export</p></header>
  <main>
    <div class="stat"><div class="n">120+</div><p>Theme fixtures</p></div>
    <div class="stat"><div class="n">11</div><p>Product repos</p></div>
    <div class="stat"><div class="n">25</div><p>MRG base bounty</p></div>
  </main>
  <footer>Demo HTML · BloggerEasy stats_counters_page</footer>
</body>
</html>
