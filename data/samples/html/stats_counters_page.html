<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Stats Counters</title>
  <meta name="description" content="Stats counters HTML fixture for BloggerEasy" />
  <style>
    body { margin:0; font-family:system-ui,sans-serif; background:#0b1220; color:#e2e8f0; }
    header { text-align:center; padding:2.75rem 1rem 1rem; }
    header h1 { margin:0 0 .5rem; font-size:1.75rem; }
    header p { margin:0; color:#94a3b8; }
    main { max-width:920px; margin:0 auto; padding:1.5rem 1.25rem 3rem;
      display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; }
    .stat { background:#111827; border:1px solid #1f2937; border-radius:14px;
      padding:1.25rem 1rem; text-align:center; }
    .stat strong { display:block; font-size:1.75rem; color:#38bdf8; margin-bottom:.35rem; }
    .stat span { color:#94a3b8; font-size:.9rem; }
    footer { text-align:center; color:#64748b; font-size:.85rem; padding:2rem; }
    @media (max-width:700px) { main { grid-template-columns:repeat(2,1fr); } }
  </style>
</head>
<body>
  <header><h1>By the numbers</h1><p>Sample stats strip for theme export</p></header>
  <main>
    <div class="stat"><strong>12k+</strong><span>Themes exported</span></div>
    <div class="stat"><strong>98%</strong><span>Offline builds</span></div>
    <div class="stat"><strong>40ms</strong><span>Avg gen time</span></div>
    <div class="stat"><strong>24/7</strong><span>Bounty queue</span></div>
  </main>
  <footer>Demo HTML · BloggerEasy stats_counters_page</footer>
</body>
</html>
