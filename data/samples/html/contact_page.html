<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Contact</title>
  <meta name="description" content="Contact HTML fixture for BloggerEasy" />
  <style>
    body { margin:0; font-family:system-ui,sans-serif; background:#f1f5f9; color:#0f172a; }
    header { padding:2rem 1.25rem; background:#0369a1; color:#f0f9ff; }
    main { max-width:560px; margin:0 auto; padding:1.5rem 1.25rem 3rem; }
    label { display:block; font-weight:600; margin:.75rem 0 .25rem; }
    input, textarea { width:100%; box-sizing:border-box; padding:.6rem .75rem;
      border:1px solid #cbd5e1; border-radius:8px; font:inherit; }
    button { margin-top:1rem; background:#0369a1; color:#fff; border:0; border-radius:8px;
      padding:.65rem 1.2rem; font-weight:600; cursor:pointer; }
    footer { text-align:center; color:#94a3b8; font-size:.85rem; padding:2rem; }
  </style>
</head>
<body>
  <header><h1>Contact us</h1><p>Sample form for theme export</p></header>
  <main>
    <label>Name</label><input type="text" placeholder="Your name" />
    <label>Email</label><input type="email" placeholder="you@example.com" />
    <label>Message</label><textarea rows="4" placeholder="How can we help?"></textarea>
    <button type="button">Send message</button>
  </main>
  <footer>Demo HTML · BloggerEasy contact_page</footer>
</body>
</html>
