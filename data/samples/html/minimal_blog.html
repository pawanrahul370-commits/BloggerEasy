<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="description" content="A minimal demo blog for BloggerEasy" />
  <title>Coastal Notes</title>
  <style>
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      color: #1e293b;
      background: #f8fafc;
    }
    header {
      background: #0ea5e9;
      color: #fff;
      padding: 2rem;
    }
    h1, h2 { font-family: Georgia, serif; color: #0f172a; }
    header h1 { color: #fff; }
    nav a { color: #e0f2fe; margin-right: 1rem; }
    .layout { display: flex; gap: 1.5rem; max-width: 1000px; margin: 1rem auto; }
    main { flex: 1; }
    aside.sidebar { width: 280px; background: #fff; border: 1px solid #e2e8f0; padding: 1rem; }
    .post { background: #fff; border: 1px solid #e2e8f0; padding: 1rem; margin-bottom: 1rem; }
    a { color: #0284c7; }
    footer { background: #0f172a; color: #cbd5e1; text-align: center; padding: 1rem; }
  </style>
</head>
<body>
  <header>
    <h1>Coastal Notes</h1>
    <p>Stories from the shore</p>
  </header>
  <nav class="menu">
    <a href="/">Home</a>
    <a href="/about">About</a>
    <a href="/contact">Contact</a>
  </nav>
  <div class="layout">
    <main>
      <article class="post">
        <h2>Morning tide</h2>
        <p>The first light hits the water and everything slows down for a moment.</p>
      </article>
      <article class="post">
        <h2>Harbor lights</h2>
        <p>At dusk the boats return and the sky turns copper and indigo.</p>
      </article>
    </main>
    <aside class="sidebar">
      <h3>About</h3>
      <p>Travel notes and photography tips.</p>
    </aside>
  </div>
  <footer>
    <p>© Coastal Notes</p>
  </footer>
</body>
</html>
