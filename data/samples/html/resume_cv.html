<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Resume / CV sample</title>
  <meta name="description" content="Resume CV layout sample for BloggerEasy" />
  <style>
    body { margin:0; font-family: Georgia, serif; background:#fafafa; color:#1a1a1a; }
    .page { max-width:720px; margin:2rem auto; padding:2rem; background:#fff; border:1px solid #e5e5e5; }
    h1 { margin:0 0 0.25rem; font-size:1.75rem; }
    .role { color:#555; margin:0 0 1.25rem; }
    h2 { font-size:1rem; text-transform:uppercase; letter-spacing:0.06em; border-bottom:1px solid #ddd; padding-bottom:0.25rem; }
    ul { padding-left:1.2rem; line-height:1.5; }
    footer { text-align:center; color:#999; margin-top:2rem; font-size:0.8rem; font-family:system-ui,sans-serif; }
  </style>
</head>
<body>
  <article class="page">
    <h1>Jordan Lee</h1>
    <p class="role">Full-stack engineer · Remote</p>
    <h2>Experience</h2>
    <ul>
      <li>Built offline-first tooling for content teams</li>
      <li>Shipped theme pipelines with golden tests</li>
    </ul>
    <h2>Skills</h2>
    <ul>
      <li>Python, TypeScript, HTML/CSS</li>
      <li>CI, packaging, documentation</li>
    </ul>
  </article>
  <footer>Demo HTML · BloggerEasy resume_cv</footer>
</body>
</html>
